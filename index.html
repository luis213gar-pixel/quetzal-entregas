<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quetzal Entregas</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { color: #2e7d32; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #25d366; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #128c7e; }
    </style>
</head>
<body>

<div class="card">
    <h2>Quetzal 📦</h2>
    
    <label>Nombre del Cliente:</label>
    <input type="text" id="nombre" placeholder="Ej. Juan Pérez">

    <label>Dirección de Entrega:</label>
    <textarea id="direccion" rows="3" placeholder="Ej. Calle 5, Zona 1..."></textarea>

    <label>Precio del Producto ($):</label>
    <input type="number" id="precio" placeholder="0.00">

    <label>Costo de Envío ($):</label>
    <input type="number" id="envio" placeholder="0.00">

    <button onclick="enviarWhatsApp()">🚀 Enviar Pedido</button>
</div>

<script>
    function enviarWhatsApp() {
        const nombre = document.getElementById('nombre').value;
        const direccion = document.getElementById('direccion').value;
        const precio = parseFloat(document.getElementById('precio').value) || 0;
        const envio = parseFloat(document.getElementById('envio').value) || 0;
        const total = precio + envio;

        const mensaje = *QUETZAL ENTREGAS*%0A%0A +
                        *Cliente:* ${nombre}%0A +
                        *Dirección:* ${direccion}%0A +
                        *Precio:* $${precio}%0A +
                        *Envío:* $${envio}%0A +
                        *TOTAL A COBRAR:* $${total.toFixed(2)};

        const url = https://wa.me/?text=${mensaje};
        window.open(url, '_blank');
    }
</script>

</body>
</html>
